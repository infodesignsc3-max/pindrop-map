<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PinDrop • Community Map</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Google Maps with async + loading=async -->
  <script async 
          src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBgIQVo9ayowavw1AoKidVqZG85MSnVt8w&libraries=places&loading=async">
  </script>
  
  <script src="https://unpkg.com/@googlemaps/markerclusterer@2.5.3/dist/index.min.js"></script>

  <style>
    #map { height: 100vh; width: 100%; }
    .modal { animation: popIn 0.3s ease-out; }
    @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="bg-zinc-950 text-white dark:bg-white dark:text-zinc-950">
  <!-- (same nav + buttons + modals as before - keeping it short) -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 dark:bg-zinc-950/95 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-800">
    <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-4xl">📍</span>
        <h1 class="text-3xl font-bold tracking-tighter">PinDrop</h1>
      </div>
      <div class="flex-1 max-w-lg mx-8">
        <input id="searchInput" type="text" placeholder="Search pins..." class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-3xl px-6 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <div class="flex items-center gap-4">
        <button onclick="toggleTheme()" class="w-11 h-11 flex items-center justify-center rounded-2xl hover:bg-zinc-200 dark:hover:bg-zinc-800">
          <span id="themeIcon" class="text-2xl">☀️</span>
        </button>
        <button onclick="location.reload()" class="text-sm font-medium hover:underline">Refresh</button>
      </div>
    </div>
  </nav>

  <div id="map" class="absolute inset-0 pt-16"></div>

  <div class="fixed bottom-8 right-8 z-50 flex flex-col gap-3 items-end">
    <button onclick="toggleEarthView()" id="earthBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-7 py-4 rounded-3xl shadow-2xl flex items-center gap-3 text-lg active:scale-95 transition-all">
      <span class="text-3xl">🌍</span>
      <span id="earthBtnText">Earth View</span>
    </button>
    <button onclick="showForm()" class="bg-black dark:bg-white dark:text-black text-white font-semibold px-8 py-4 rounded-3xl shadow-2xl hover:scale-105 transition flex items-center gap-3 text-lg">
      <span class="text-2xl">📍</span>
      Drop a Pin — $1
    </button>
  </div>

  <!-- Form Modal (same as last version) -->
  <div id="formModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
    <div class="modal bg-white dark:bg-zinc-900 rounded-3xl max-w-md w-full mx-4 p-8">
      <h2 class="text-3xl font-bold mb-6">Drop your pin</h2>
      <div id="pickerMap" class="h-80 rounded-2xl mb-6 border border-zinc-300 dark:border-zinc-700"></div>
      <input type="file" id="imageInput" accept="image/*" class="block w-full mb-4 text-sm">
      <textarea id="descInput" rows="3" placeholder="Optional message..." class="w-full bg-zinc-100 dark:bg-zinc-800 rounded-2xl p-4 mb-4"></textarea>
      <input type="email" id="emailInput" placeholder="Your email (optional)" class="w-full bg-zinc-100 dark:bg-zinc-800 rounded-2xl p-4 mb-6">
      <div class="flex gap-4">
        <button onclick="submitPin()" class="flex-1 bg-black dark:bg-white dark:text-black py-4 rounded-3xl font-semibold hover:bg-emerald-500 transition">Pay $1 & Submit</button>
        <button onclick="hideForm()" class="flex-1 border border-zinc-400 dark:border-zinc-600 py-4 rounded-3xl font-semibold">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Thank You Modal (same) -->
  <div id="thankYouModal" class="hidden fixed inset-0 bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center z-[200]">
    <div class="text-center text-white max-w-md px-8">
      <div class="text-8xl mb-6">🎉</div>
      <h1 class="text-5xl font-bold mb-3">Thank you!</h1>
      <p class="text-2xl mb-8">Your pin is now live.</p>
      <button onclick="hideThankYou()" class="mt-10 px-10 py-4 bg-white text-emerald-600 rounded-3xl font-semibold text-xl hover:scale-105 transition">Back to Map</button>
    </div>
  </div>

  <script>
    const supabaseUrl = 'https://uausvultvdpbcpmdqqcy.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhdXN2dWx0dmRwYmNwbWRxY2N5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NTM2MTAsImV4cCI6MjA5NDQyOTYxMH0.Hozm5Cezuwgb9guo0ZI5r0LIHZrkoWIigERTNhfkWvY';

    let supabaseClient;
    let map, pickerMap, clusterer, markersArray = [];
    let selectedLat = null, selectedLng = null;
    let isEarthView = true;

    async function initSupabase() {
      supabaseClient = Supabase.createClient(supabaseUrl, supabaseKey);
    }

    async function loadPins() {
      if (!supabaseClient) return;
      const thirtyDaysAgo = new Date(Date.now() - 30*24*60*60*1000);
      const { data: pins } = await supabaseClient.from('pins').select('*').gte('created_at', thirtyDaysAgo.toISOString());

      if (clusterer) clusterer.clearMarkers();
      markersArray = [];

      pins?.forEach(pin => {
        const marker = new google.maps.Marker({ position: { lat: pin.lat, lng: pin.lng }, animation: google.maps.Animation.DROP });
        const infoWindow = new google.maps.InfoWindow({
          content: `<div class="max-w-[280px]"><img src="${pin.image_url}" class="w-full rounded-2xl mb-3"><p class="text-sm">${pin.description || ''}</p></div>`
        });
        marker.addListener('click', () => infoWindow.open(map, marker));
        markersArray.push({ marker, description: (pin.description || '').toLowerCase() });
      });

      clusterer = new MarkerClusterer({ map, markers: markersArray.map(m => m.marker) });
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 39.8283, lng: -98.5795 },
        zoom: 5,
        mapTypeId: google.maps.MapTypeId.HYBRID,
        tilt: 45
      });
      loadPins();
    }

    // showForm, hideForm, submitPin, toggleEarthView, toggleTheme, hideThankYou, checkSuccess functions are the same as last version

    function showForm() { /* paste from previous if needed */ }
    // ... (I can send the full one again if you want)

    window.onload = async () => {
      await initSupabase();
      initMap();
      checkSuccess();

      if (localStorage.theme === 'light') document.documentElement.classList.remove('dark');
      document.getElementById('themeIcon').textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
    };
  </script>
</body>
</html>
